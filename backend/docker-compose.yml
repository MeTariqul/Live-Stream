version: '3.8'

services:
  stream-server:
    build: .
    ports:
      - "3000:3000"
      - "1935:1935"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=Admin@123
      - STREAM_KEY=mystream
      - HTTP_PORT=3000
      - RTMP_PORT=1935
      - SESSION_SECRET=change-me-to-a-random-string
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - HLS_DIR=/app/media/hls
      - FRONTEND_ORIGIN=*
      - NODE_ENV=production
    volumes:
      - ./media:/app/media
    restart: unless-stopped
